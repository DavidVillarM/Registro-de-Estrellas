version: "3.9"
services:
  db:
    image: postgres:16
    container_name: estrellas_db
    environment:
      POSTGRES_DB: estrellas
      POSTGRES_USER: estrellas_user
      POSTGRES_PASSWORD: estrellas_pass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db/import:/import

  api:
    build: ./api
    container_name: estrellas_api
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__Default: Host=db;Port=5432;Database=estrellas;Username=estrellas_user;Password=estrellas_pass
      Cors__AllowedOrigins__0: http://localhost:5173
      Cors__AllowedOrigins__1: http://localhost:3000
      Cors__AllowedOrigins__2: http://localhost
    ports:
      - "8080:8080"
    depends_on:
      - db
  web:
    build: ./web
    container_name: estrellas_web
    environment:
      VITE_API_BASE: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  db_data:

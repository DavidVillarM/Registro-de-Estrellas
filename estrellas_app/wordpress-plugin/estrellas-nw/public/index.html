<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estrellas NW</title>
    <style>
      :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
      body { margin: 0; background: #0b1020; color: #e9edf8; }
      a { color: inherit; text-decoration: none; }
      .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
      .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); border-radius: 14px; padding: 16px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; }
      .btn { border: 1px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.08); color: #fff; padding: 10px 12px; border-radius: 12px; cursor: pointer; }
      .btn:hover { background: rgba(255,255,255,0.12); }
      .btn.primary { background: #2b5cff; border-color: #2b5cff; }
      .btn.primary:hover { filter: brightness(1.05); }
      input, select { background: rgba(0,0,0,0.35); color: #fff; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 10px 12px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.10); text-align: left; }
      th { opacity: .85; font-weight: 600; }
      .pill { display:inline-flex; padding: 2px 10px; border-radius: 999px; border:1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); font-size: 12px; }
      .muted { opacity: .75; }
      .nav { display:flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
      .nav .btn { padding: 8px 10px; }
      .grid2 { display:grid; grid-template-columns: 1.2fr .8fr; gap: 12px; }
      @media (max-width: 900px){ .grid2{ grid-template-columns: 1fr; } }
      .title { font-size: 22px; font-weight: 800; margin: 0 0 10px; }
      .subtitle { margin: 0 0 14px; opacity: .8; }
      .danger { background: rgba(255, 80, 80, 0.15); border-color: rgba(255, 80, 80, 0.35); }
    </style>
    <script type="module" crossorigin src="/assets/app.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/app.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
